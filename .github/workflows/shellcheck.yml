name: ShellCheck

on:
  pull_request:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  push:
    paths:
      - "**/*.sh"
      - ".github/workflows/shellcheck.yml"
  workflow_dispatch:

jobs:
  shellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.1

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        shell: bash
        run: |
          mapfile -t scripts < <(git ls-files '*.sh')
          shellcheck -x "${scripts[@]}"
